name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: generate black-and-white snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wermex
          outputs: |
            dist/snake.svg?color_snake=white&color_dots=#111,#222,#333,#444,#555
            dist/snake-dark.svg?palette=github-dark&color_snake=white&color_dots=#111,#222,#333,#444,#555

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
